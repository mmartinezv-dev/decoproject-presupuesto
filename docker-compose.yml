services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_NAME:-decoproject}
      MYSQL_USER: ${DB_USER:-decoproject}
      MYSQL_PASSWORD: ${DB_PASS:-decoproject}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-rootpassword}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    command:
      - --slow-query-log=ON
      - --slow-query-log-file=/var/log/mysql/slow-query.log
      - --long-query-time=1
      - --log-error=/var/log/mysql/error.log
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: production
    env_file: ./backend/.env
    environment:
      DB_HOST: db
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: production
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
