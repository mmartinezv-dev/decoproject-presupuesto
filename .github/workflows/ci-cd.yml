name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci-backend:
    name: Backend CI (Lint & Build)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: decoproject_test
          MYSQL_USER: decoproject
          MYSQL_PASSWORD: decoproject
          MYSQL_ROOT_PASSWORD: rootpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: decoproject
      DB_PASS: decoproject
      DB_NAME: decoproject_test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm test -- --runInBand
      - run: npm run test:e2e -- --runInBand
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high

  ci-frontend:
    name: Frontend CI (Build & Type-check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high

  deploy:
    name: Build & Deploy to Lightsail
    needs: [ci-backend, ci-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Build Backend
        run: |
          cd backend
          npm ci
          npm run build

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Package Release
        run: |
          touch backend/ecosystem.config.js
          tar -czf release.tar.gz \
            backend/dist \
            backend/package.json \
            backend/package-lock.json \
            backend/ecosystem.config.js \
            backend/backup_database.js \
            backend/run_migrations.js \
            frontend/dist \
            aws

      - name: Create Remote Temp Dir
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p /home/admin/app_new

      - name: Upload to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "release.tar.gz"
          target: "/home/admin/app_new"

      - name: SSH Deploy & Swap
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            echo "=== Desempaquetando la nueva versión ==="
            cd /home/admin/app_new
            tar -xzf release.tar.gz
            rm release.tar.gz

            echo "=== Copiando ecosistema y configuraciones de producción ==="
            if [ -f /home/admin/app/backend/ecosystem.config.js ]; then
              cp /home/admin/app/backend/ecosystem.config.js /home/admin/app_new/backend/ecosystem.config.js
            fi

            echo "=== Instalando dependencias de producción en backend ==="
            cd /home/admin/app_new/backend
            npm ci --omit=dev

            echo "=== Respaldando base de datos ==="
            node backup_database.js

            echo "=== Ejecutando migraciones ==="
            npm run migration:run:prod

            echo "=== Realizando Swap de carpetas (Intercambio en caliente) ==="
            if [ -d /home/admin/app_backup ]; then
              rm -rf /home/admin/app_backup
            fi
            mv /home/admin/app /home/admin/app_backup
            mv /home/admin/app_new /home/admin/app

            echo "=== Configurando directorio de logs ==="
            sudo mkdir -p /var/log/decoproject
            sudo chown admin:admin /var/log/decoproject

            echo "=== Aplicando configuración de CloudWatch Agent ==="
            if command -v amazon-cloudwatch-agent-ctl &> /dev/null && [ -f /home/admin/app/aws/cloudwatch-agent-config.json ]; then
              sudo amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -s -c file:/home/admin/app/aws/cloudwatch-agent-config.json
            fi

            echo "=== Aplicando configuración de Nginx ==="
            if [ -f /home/admin/app/aws/nginx.conf ]; then
              sudo cp /home/admin/app/aws/nginx.conf /etc/nginx/sites-available/decoproject
              sudo ln -sf /etc/nginx/sites-available/decoproject /etc/nginx/sites-enabled/decoproject
              sudo nginx -t && sudo systemctl reload nginx
            fi

            echo "=== Recargando PM2 (Zero Downtime) ==="
            cd /home/admin/app/backend
            pm2 reload ecosystem.config.js --update-env
            pm2 save

            echo "=== Despliegue completo con éxito ==="
